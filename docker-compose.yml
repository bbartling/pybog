services:
  # PostgreSQL with pgvector for embeddings + app data
  postgres:
    image: ankane/pgvector:latest
    container_name: pybog-postgres
    environment:
      POSTGRES_USER: pybog
      POSTGRES_PASSWORD: pybog123
      POSTGRES_DB: pybog
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_database.sql:/docker-entrypoint-initdb.d/01-init-database.sql:ro
    ports:
      - "5433:5432"
    networks:
      - pybog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pybog -d pybog"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pybog-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pybog-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PyBog Backend (Development with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pybog-backend
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://pybog:pybog123@postgres:5432/pybog
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://localhost:3847
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
    volumes:
      - ./backend:/app
      - ./data/outputs:/app/data/outputs
      - ./data/uploads:/app/data/uploads
    ports:
      - "8847:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pybog-network
    restart: unless-stopped
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-use-colors"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # React Frontend (Development with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: pybog-frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_BACKEND_URL=http://backend:8000
      - REACT_APP_WS_BACKEND_URL=ws://backend:8000
      - REACT_APP_API_URL=http://localhost:8847
      - REACT_APP_WS_URL=ws://localhost:8847
      - WDS_SOCKET_HOST=127.0.0.1
      - WDS_SOCKET_PORT=3847
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3847:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pybog-network
    restart: unless-stopped
    command: npm start
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pybog-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
      - ./pgpass:/pgpass:ro
    ports:
      - "5847:80"
    networks:
      - pybog-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  pybog-network:
    driver: bridge