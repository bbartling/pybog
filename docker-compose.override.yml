services:
  # Override frontend for development with hot reload (separate container)
  frontend-dev:
    container_name: pybog-frontend-dev
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    volumes:
      # Mount source code for hot reload
      - ./frontend:/app
      # Keep node_modules inside container
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_N8N_URL=http://localhost:5678
      - REACT_APP_WS_URL=ws://localhost:8000
      - WDS_SOCKET_HOST=127.0.0.1
      - WDS_SOCKET_PORT=3001
    command: npm start
    stdin_open: true
    tty: true
