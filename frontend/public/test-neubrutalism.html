<!DOCTYPE html>
<html>
<head>
    <title>Neubrutalism Test</title>
    <style>
        body {
            background: #F7F8FA;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            padding: 20px;
        }
        .test-card {
            background: #FFFFFF;
            border: 2px solid #3F3F4B;
            border-radius: 12px;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        .test-header {
            background: #ECEEF5;
            border: 2px solid #3F3F4B;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 16px;
            color: #1F1F1F;
        }
        .test-button {
            background: #4A9EFF;
            border: 2px solid #3F3F4B;
            border-radius: 8px;
            padding: 10px 20px;
            color: #FFFFFF;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px;
        }
        .test-button:hover {
            transform: translateY(-1px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .test-grid {
            background-image: 
                linear-gradient(0deg, #E9EBF2 1px, transparent 1px),
                linear-gradient(90deg, #E9EBF2 1px, transparent 1px);
            background-size: 16px 16px;
            height: 100px;
            border: 2px solid #3F3F4B;
            border-radius: 8px;
            margin: 20px 0;
        }
        .status-dots {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .status-dot {
            width: 20px;
            height: 20px;
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <div class="test-card">
        <div class="test-header">✅ Neubrutalism Style Test</div>
        
        <h2>If you see this page with:</h2>
        <ul>
            <li>Light gray background (#F7F8FA)</li>
            <li>Bold black borders (2px solid)</li>
            <li>Rounded corners</li>
            <li>Clean white card backgrounds</li>
        </ul>
        
        <p>Then the neubrutalism styles are working!</p>
        
        <div class="test-grid"></div>
        
        <div>
            <button class="test-button">Test Button</button>
            <button class="test-button" style="background: #2DB72D;">Success</button>
            <button class="test-button" style="background: #FFA500;">Warning</button>
        </div>
        
        <div class="status-dots">
            <div class="status-dot" style="background: #2DB72D;"></div>
            <div class="status-dot" style="background: #FFA500;"></div>
            <div class="status-dot" style="background: #FF4444;"></div>
            <div class="status-dot" style="background: #4A9EFF;"></div>
            <div class="status-dot" style="background: #6D6E7A;"></div>
        </div>
        
        <p style="color: #6D6E7A; font-size: 12px;">
            Access this test at: http://localhost:3002/test-neubrutalism.html
        </p>
    </div>
</body>
</html>
